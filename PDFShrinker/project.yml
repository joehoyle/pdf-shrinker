name: PDFShrinker
options:
  bundleIdPrefix: com.joehoyle
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.30"
settings:
  base:
    PRODUCT_NAME: PDF Shrinker
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
targets:
  PDFShrinker:
    type: application
    platform: macOS
    sources:
      - path: PDFShrinker
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joehoyle.pdf-shrinker
        INFOPLIST_FILE: PDFShrinker/Info.plist
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_APP_SANDBOX: false
        ENABLE_HARDENED_RUNTIME: false
        PRODUCT_NAME: PDF Shrinker
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
