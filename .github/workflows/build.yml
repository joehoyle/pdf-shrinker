name: Build PDF Shrinker

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15  # Apple Silicon runner with Xcode 16
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install ghostscript xcodegen

      - name: Build app
        run: ./build.sh

      - name: Verify bundled gs works
        run: |
          GS="PDF Shrinker.app/Contents/Helpers/gs"
          RESOURCES="PDF Shrinker.app/Contents/Resources/ghostscript"
          GS_LIB="$RESOURCES/lib:$RESOURCES/Resource/Init:$RESOURCES/iccprofiles" \
          "$GS" --version

      - name: Create zip
        run: ditto -c -k --keepParent "PDF Shrinker.app" "PDF Shrinker.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF Shrinker
          path: PDF Shrinker.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: PDF Shrinker.zip
