name: Build PDF Shrinker

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install ghostscript xcodegen

      - name: Build app
        run: ./build.sh

      - name: Verify bundled gs works
        run: |
          GS="PDF Shrinker.app/Contents/Helpers/gs"
          RESOURCES="PDF Shrinker.app/Contents/Resources/ghostscript"
          GS_LIB="$RESOURCES/lib:$RESOURCES/Resource/Init:$RESOURCES/iccprofiles" \
          "$GS" --version

      - name: Import signing certificate
        if: github.event_name != 'pull_request'
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          rm -f $RUNNER_TEMP/cert.p12

      - name: Code sign app
        if: github.event_name != 'pull_request'
        env:
          SIGN_IDENTITY: "Developer ID Application: Human Made Limited (ZLF8FFAD7U)"
        run: |
          APP="PDF Shrinker.app"

          # Sign dylibs first
          for dylib in "$APP/Contents/Frameworks/"*.dylib; do
            codesign --force --options runtime --timestamp --sign "$SIGN_IDENTITY" "$dylib"
          done

          # Sign gs binary
          codesign --force --options runtime --timestamp --sign "$SIGN_IDENTITY" "$APP/Contents/Helpers/gs"

          # Sign the app
          codesign --force --options runtime --timestamp --sign "$SIGN_IDENTITY" "$APP"

          # Verify
          codesign --verify --deep --strict "$APP"

      - name: Notarize app
        if: startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP="PDF Shrinker.app"

          # Create zip for notarization
          ditto -c -k --keepParent "$APP" "notarize.zip"

          # Submit for notarization
          xcrun notarytool submit "notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple the ticket
          xcrun stapler staple "$APP"

          rm -f notarize.zip

      - name: Create zip
        run: ditto -c -k --keepParent "PDF Shrinker.app" "PDF Shrinker.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF Shrinker
          path: PDF Shrinker.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: PDF Shrinker.zip
